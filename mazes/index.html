<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Micromouse Mazes Collection</title>
  <link rel="icon" type="image/gif" href="/mmr/mi.gif">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    button { font: inherit; background: none; border: none; cursor: pointer; }

    :root {
      --bg:           #f1f5f9;
      --surface:      #ffffff;
      --surface-dim:  #f8fafc;
      --primary:      #2563eb;
      --primary-h:    #1d4ed8;
      --text-1:       #0f172a;
      --text-2:       #475569;
      --text-3:       #94a3b8;
      --border:       #e2e8f0;
      --radius:       12px;
      --radius-sm:    8px;
      --shadow:       0 1px 3px 0 rgb(0 0 0/.10), 0 1px 2px -1px rgb(0 0 0/.10);
      --shadow-lg:    0 10px 25px -5px rgb(0 0 0/.14), 0 4px 10px -6px rgb(0 0 0/.10);
      --ease:         cubic-bezier(.4,0,.2,1);
      --font:         system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:          #0f172a;
        --surface:     #1e293b;
        --surface-dim: #162032;
        --primary:     #3b82f6;
        --primary-h:   #2563eb;
        --text-1:      #f1f5f9;
        --text-2:      #94a3b8;
        --text-3:      #475569;
        --border:      #334155;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-1);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────── */
    .site-header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgb(255 255 255 / .88);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }

    @media (prefers-color-scheme: dark) {
      .site-header { background: rgb(15 23 42 / .88); }
    }

    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .site-title {
      font-size: 1.125rem;
      font-weight: 700;
      letter-spacing: -.03em;
      white-space: nowrap;
      color: var(--text-1);
      flex-shrink: 0;
    }

    .site-title em {
      font-style: normal;
      color: var(--primary);
    }

    .search-box {
      flex: 1;
      max-width: 380px;
      margin-left: auto;
      position: relative;
    }

    .search-box svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      color: var(--text-3);
    }

    #q {
      width: 100%;
      padding: 9px 12px 9px 36px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font: .875rem/1 var(--font);
      color: var(--text-1);
      outline: none;
      transition: border-color .15s var(--ease), box-shadow .15s var(--ease);
    }

    #q::placeholder { color: var(--text-3); }
    #q:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgb(37 99 235 / .18);
    }

    /* ── Toolbar ─────────────────────────── */
    .toolbar {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 24px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .maze-count {
      font-size: .8125rem;
      color: var(--text-2);
    }

    .maze-count b { color: var(--text-1); }

    /* ── Grid ─────────────────────────── */
    main {
      max-width: 1440px;
      margin: 0 auto;
      padding: 20px 24px 60px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
    }

    /* ── Card ─────────────────────────── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow .2s var(--ease), transform .2s var(--ease), border-color .2s var(--ease);
    }

    .card:hover {
      box-shadow: var(--shadow-lg);
      transform: translateY(-3px);
      border-color: transparent;
    }

    .card-thumb {
      display: block;
      background: var(--surface-dim);
      overflow: hidden;
      aspect-ratio: 1;
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      padding: 10px;
      display: block;
      transition: transform .25s var(--ease);
    }

    .card:hover .card-thumb img { transform: scale(1.07); }

    .card-body {
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      flex: 1;
    }

    .card-name {
      font-size: .875rem;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-links {
      display: flex;
      gap: 6px;
      margin-top: auto;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 20px;
      font-size: .75rem;
      font-weight: 500;
      text-decoration: none;
      transition: background .15s, color .15s, border-color .15s;
      line-height: 1;
      cursor: pointer;
    }

    .chip-ghost {
      border: 1px solid var(--border);
      color: var(--text-2);
      background: transparent;
    }

    .chip-ghost:hover {
      background: var(--bg);
      border-color: var(--primary);
      color: var(--primary);
    }

    .chip-solid {
      background: var(--primary);
      border: 1px solid transparent;
      color: #fff;
    }

    .chip-solid:hover { background: var(--primary-h); }

    /* ── Empty state ─────────────────────────── */
    .empty {
      grid-column: 1 / -1;
      padding: 80px 24px;
      text-align: center;
      color: var(--text-2);
    }

    .empty h2 { margin-bottom: 8px; font-size: 1.125rem; color: var(--text-1); }

    /* ── Footer ─────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding: 28px 24px;
      text-align: center;
      font-size: .8125rem;
      color: var(--text-2);
    }

    .footer-inner { display: flex; flex-direction: column; gap: 6px; align-items: center; }
    .footer-adapted { font-size: .75rem; color: var(--text-3); }

    footer a { color: var(--primary); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* ── Accessibility ─────────────────────────── */
    :focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
      border-radius: 4px;
    }

    /* ── Responsive ─────────────────────────── */
    @media (max-width: 640px) {
      .header-inner, .toolbar, main, footer { padding-left: 16px; padding-right: 16px; }
      .grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
      .site-title { font-size: 1rem; }
    }

    /* ── Dialog ─────────────────────────── */
    dialog {
      border: none;
      border-radius: var(--radius);
      padding: 0;
      background: var(--surface);
      color: var(--text-1);
      box-shadow: var(--shadow-lg);
      max-width: min(90vw, 820px);
      width: 100%;
      max-height: 90vh;
      overflow: hidden;
      position: fixed;
      inset: 0;
      margin: auto;
    }

    dialog[open] {
      display: flex;
      flex-direction: column;
    }

    dialog::backdrop {
      background: rgb(0 0 0 / .55);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .dialog-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      gap: 12px;
    }

    .dialog-title {
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: -.02em;
      color: var(--text-1);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dialog-close {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      color: var(--text-2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background .15s var(--ease), color .15s var(--ease);
    }

    .dialog-close:hover { background: var(--border); color: var(--text-1); }

    .dialog-body {
      overflow: auto;
      flex: 1;
      padding: 20px;
    }

    .dialog-body img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
      border-radius: var(--radius-sm);
    }

    .dialog-body pre {
      font-family: ui-monospace, 'Cascadia Code', 'Fira Code', 'SF Mono', monospace;
      font-size: .8125rem;
      line-height: 1.65;
      color: var(--text-1);
      white-space: pre;
      overflow-x: auto;
    }

    .dialog-footer {
      padding: 12px 20px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--radius-sm);
      font-size: .875rem;
      font-weight: 500;
      font-family: var(--font);
      text-decoration: none;
      cursor: pointer;
      transition: background .15s var(--ease), border-color .15s var(--ease), color .15s var(--ease);
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-2);
    }

    .btn-ghost:hover { border-color: var(--primary); color: var(--primary); }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <span class="site-title">Micromouse <em>Mazes</em></span>
    <div class="search-box">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
           stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="search" id="q" placeholder="Search mazes…"
             aria-label="Search mazes" autocomplete="off" spellcheck="false">
    </div>
  </div>
</header>

<div class="toolbar">
  <p class="maze-count" role="status" aria-live="polite">
    Showing <b id="count">0</b> mazes
  </p>
</div>

<main>
  <div class="grid" id="grid" role="list"></div>
</main>

<footer>
  <div class="footer-inner">
    <p>Original maze collection by <a href="http://www.tcp4me.com" target="_blank" rel="noopener noreferrer">Jeff Weisberg</a>.</p>
    <p class="footer-adapted">
      Adapted &amp; extended for
      <a href="https://github.com/FrancescoGuarda/Rob-26-MazeSolver/tree/main" target="_blank" rel="noopener noreferrer">Rob-26-MazeSolver</a>
      by
      <a href="https://github.com/FrancescoGuarda" target="_blank" rel="noopener noreferrer">Francesco Guarda</a>
      &amp;
      <a href="https://github.com/moroandrea" target="_blank" rel="noopener noreferrer">Andrea Moro</a>.
    </p>
  </div>
</footer>

<!-- ── Image viewer dialog ───────────────────── -->
<dialog id="img-dialog" aria-labelledby="img-title" aria-modal="true">
  <div class="dialog-header">
    <h2 class="dialog-title" id="img-title"></h2>
    <button class="dialog-close" id="img-close" aria-label="Close">

        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="dialog-body">
    <img id="img-preview" src="" alt="">
  </div>
  <div class="dialog-footer">
    <a class="btn btn-ghost" id="img-download" href="#" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">

  </div>
</dialog>

<!-- ── Text viewer dialog ────────────────────── -->
<dialog id="text-dialog" aria-labelledby="text-title" aria-modal="true">
  <div class="dialog-header">
    <h2 class="dialog-title" id="text-title"></h2>
    <button class="dialog-close" id="text-close" aria-label="Close">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div class="dialog-body">
    <pre id="text-content" aria-label="Maze text content"></pre>
  </div>
  <div class="dialog-footer">
    <a class="btn btn-ghost" id="text-download" href="#" download>
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/>
        <line x1="12" y1="15" x2="12" y2="3"/>
      </svg>
      Download .txt
    </a>
  </div>
</dialog>

+   +---+---+---+---+   +   +   +   +   +   +   +   +   +   +   +\n|   |                   |       |       |       |   |   |       |\n+---+---+---+---+---+---+---+---+---+---+---+---+---+---+---+---+\n", "zigzag": "+---+---+---+---+---+---+---+---+---+---+---+---+---+---+---+---+\n|           |       |       |       |       |       |       |   |\n+---+   +   +   +   +   +   +   +   +   +   +   +   +   +   +   +\n|       |       |       |       |       |       |       |       |\n+   +---+---+---+---+---+---+---+---+---+---+---+---+---+---+   +\n|       |           |       |       |       |       |   |       |\n+---+   +---+   +   +   +   +   +   +   +   +   +   +   +   +---+\n|       |       |       |       |       |       |       |       |\n+   +---+   +---+---+---+---+---+---+---+---+---+---+   +---+   +\n|       |       |           |       |       |   |       |       |\n+---+   +---+   +---+   +   +   +   +   +   +   +   +---+   +---+\n|       |       |       |       |       |       |       |       |\n+   +---+   +---+   +---+---+---+---+---+---+   +---+   +---+   +\n|       |       |       |               |       |       |       |\n+---+   +---+   +---+   +   +---+---+   +   +---+   +---+   +---+\n|       |       |       |   |       |   |       |       |       |\n+   +---+   +---+   +---+   +   +   +   +---+   +---+   +---+   +\n|       |       |       |   |       |   |       |       |       |\n+---+   +---+   +---+   +   +   +---+   +   +---+   +---+   +---+\n|       |       |           |           |       |       |       |\n+   +---+   +---+---+---+---+---+---+---+---+   +---+   +---+   +\n|       |       |       |       |       |       |       |       |\n+---+   +   +   +   +   +   +   +   +   +   +---+   +---+   +---+\n|       |   |       |       |       |           |       |       |\n+   +---+---+---+---+---+---+---+---+---+---+---+---+   +---+   +\n|       |       |       |       |       |       |       |       |\n+---+   +   +   +   +   +   +   +   +   +   +   +   +---+   +---+\n|   |       |       |       |       |       |           |       |\n+   +---+---+---+---+---+---+---+---+---+---+---+---+---+---+   +\n|       |       |       |       |       |       |       |       |\n+   +   +   +   +   +   +   +   +   +   +   +   +   +   +   +---+\n|   |       |       |       |       |       |       |           |\n+---+---+---+---+---+---+---+---+---+---+---+---+---+---+---+---+\n"};

  const MAZES = [
    "2018apec","2017apec","2017japan","2016apec","2015apec","2015japan",
    "2014apec","2014japan","2013apec","2013japan","2012japan-eq","2012uk-techfest",
    "2011robotic","2011uk-techfest","2009japan","2008japan","2008robotic",
    "96japx","93apec","93japx","92bos","92lon",
    "91hon","91japq","91tor",
    "90lon","90tor",
    "89ape","89iee","89sina1",
    "88iee","88jap","88lon","88mtl","88sin","88us",
    "87iee","87sin",
    "86","86jap","86us",
    "85japx","85usa","84japx","83jap","83us",
    "82japx","82us",
    "1stworld","j1",
    "00japan","loop","museum","test1","zigzag"
  ];

  const grid  = document.getElementById('grid');
  const countEl = document.getElementById('count');
  const searchEl = document.getElementById('q');

  const FILE_ICON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
    <polyline points="14 2 14 8 20 8"/></svg>`;

  const IMG_ICON = `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor"
    stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <rect x="3" y="3" width="18" height="18" rx="2"/>
    <circle cx="8.5" cy="8.5" r="1.5"/>
    <polyline points="21 15 16 10 5 21"/></svg>`;

  function card(name) {
    return `<article class="card" role="listitem">
      <button class="card-thumb" data-action="img" data-name="${name}" aria-label="${name} — preview image">
        <img src="img/${name}.png" alt="${name} maze preview" loading="lazy" width="200" height="200">
      </button>
      <div class="card-body">
        <h2 class="card-name" title="${name}">${name}</h2>
        <div class="card-links">
          <button class="chip chip-ghost" data-action="text" data-name="${name}" aria-label="View ${name} maze text">${FILE_ICON} text</button>
          <button class="chip chip-solid" data-action="img" data-name="${name}" aria-label="View ${name} PNG image">${IMG_ICON} png</button>
        </div>
      </div>
    </article>`;
  }

  function render(list) {
    grid.innerHTML = list.length
      ? list.map(card).join('')
      : `<div class="empty"><h2>No mazes found</h2><p>Try a different search term.</p></div>`;
    countEl.textContent = list.length;
  }

  searchEl.addEventListener('input', () => {
    const q = searchEl.value.trim().toLowerCase();
    render(q ? MAZES.filter(n => n.toLowerCase().includes(q)) : MAZES);
  });

  render(MAZES);

  // ── Modal logic ─────────────────────────────
  const imgDialog   = document.getElementById('img-dialog');
  const imgTitle    = document.getElementById('img-title');
  const imgPreview  = document.getElementById('img-preview');
  const imgDownload = document.getElementById('img-download');
  const imgClose    = document.getElementById('img-close');

  const textDialog   = document.getElementById('text-dialog');
  const textTitle    = document.getElementById('text-title');
  const textContent  = document.getElementById('text-content');
  const textDownload = document.getElementById('text-download');
  const textClose    = document.getElementById('text-close');

  function openImgDialog(name) {
    const src = `img2/${name}.png`;
    imgTitle.textContent = name;
    imgPreview.src = src;
    imgPreview.alt = `${name} maze — full size`;
    imgDownload.href = src;
    imgDownload.download = `${name}.png`;
    imgDialog.showModal();
  }

  function openTextDialog(name) {
    const src = `txt/${name}.txt`;
    textTitle.textContent = name;
    textDownload.href = src;
    textDownload.download = `${name}.txt`;
    const text = MAZE_DATA[name];
    textContent.textContent = text !== undefined ? text : 'Maze data not available.';
    textDialog.showModal();
  }

  // Close on × button
  imgClose.addEventListener('click',  () => imgDialog.close());
  textClose.addEventListener('click', () => textDialog.close());

  // Close on backdrop click
  [imgDialog, textDialog].forEach(dlg => {
    dlg.addEventListener('click', e => { if (e.target === dlg) dlg.close(); });
  });

  // Open via event delegation on the grid
  grid.addEventListener('click', e => {
    const btn = e.target.closest('[data-action]');
    if (!btn) return;
    const { action, name } = btn.dataset;
    if (action === 'img')  openImgDialog(name);
    if (action === 'text') openTextDialog(name);
  });
